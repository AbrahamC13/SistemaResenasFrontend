<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Registro</title>
    </head>

    <body>

        <div class="card">

            <div class="topForm">
                <h1>Registro</h1>
                <p>Crea una cuenta nueva</p>
            </div>

            <div class="centerForm">
                <form id="registerForm" class="registerForm">
                    <div>
                        <h2>Usuario</h2>
                        <input type="text" id="usernameInput" placeholder="Ingrese un usuario" required />
                    </div>
                    <div>
                        <h2>Contraseña</h2>
                        <input type="password" id="passwordInput" placeholder="Ingrese una contraseña" required />
                    </div>
                    <div>
                        <h2>Confirmar Contraseña</h2>
                        <input type="password" id="confirmPasswordInput" placeholder="Repita su contraseña" required />
                    </div>
                </form>
            </div>

            <div class="bottomForm">
                <div>
                    <button type="submit" form="registerForm">Registrarse</button>
                </div>
                
                <p id="statusMessage" class="statusMessage"></p>

                <div>
                    <p>¿Ya tienes cuenta? 
                        <a href="../L_Login/login.html">Inicia sesión aquí</a>
                    </p>
                </div>
            </div>

        </div> 

        <script src="register.js"></script>
    </body>

</html>
