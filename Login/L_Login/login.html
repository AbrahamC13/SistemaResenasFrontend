<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Login</title>
    </head>

    <body>

        <div class="card">

            <div class="topForm">
                <h1>Inicio de sesión</h1>
                <p>Ingrese sus credenciales para continuar</p>
            </div>

            <div class="centerForm">
                <form id="loginForm" class="loginForm">

                    <div>
                        <h2>Usuario</h2>
                        <input type="text" id="usernameInput" placeholder="Ingrese su usuario" required>
                    </div>

                    <div>
                        <h2>Contraseña</h2>
                        <input type="password" id="passwordInput" placeholder="Ingrese su contraseña" required>
                    </div>

                </form>
            </div>

            <div class="bottomForm">

                    <div>
                        <button type="submit" form="loginForm">Iniciar sesión</button>
                    </div>

                    <p id="statusMessage" class="statusMessage"></p>

                    <div>
                        <p>¿No tienes cuenta? 
                            <a href="../L_Register/register.html">Regístrate aquí</a>
                        </p>
                    </div>

            </div>

        </div>

        <script src="login.js"></script>
    </body>

</html>
